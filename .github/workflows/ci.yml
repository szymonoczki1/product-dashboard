name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # ── Job 2: Test (matrix) ─────────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20, 22]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Save test report
        if: matrix.node-version == 20 && always()
        run: |
          mkdir -p test-results
          echo "Node.js version : ${{ matrix.node-version }}" > test-results/summary.txt
          echo "Run date        : $(date -u)"                >> test-results/summary.txt
          echo "Status          : ${{ job.status }}"         >> test-results/summary.txt

      - name: Upload test report artifact
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/test-results/
          retention-days: 7

      - name: Write step summary
        if: always()
        run: |
          echo "## Test Results (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo ""                                                   >> $GITHUB_STEP_SUMMARY
          echo "| Metric           | Value                        |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js version  | ${{ matrix.node-version }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner OS        | ${{ runner.os }}             |" >> $GITHUB_STEP_SUMMARY
          echo "| Job status       | ${{ job.status }}            |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Write build summary
        run: |
          echo "## Build Report"                               >> $GITHUB_STEP_SUMMARY
          echo ""                                              >> $GITHUB_STEP_SUMMARY
          echo "| Item             | Value                   |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|-------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js version  | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build status     | Success                 |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp        | $(date -u)              |" >> $GITHUB_STEP_SUMMARY
