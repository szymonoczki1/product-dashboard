name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:

  # ── Job 1: Lint (via reusable workflow) ──────────────────────────────────
  lint:
    name: Lint
    uses: ./.github/workflows/setup-node.yml
    with:
      node-version: '20'
      script: lint

  # ── Job 2: Test matrix (via reusable workflow) ────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    uses: ./.github/workflows/setup-node.yml
    with:
      node-version: ${{ matrix.node-version }}
      script: test

  # ── Job 3: Integration tests (PostgreSQL service container) ───────────────
  test-integration:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PGHOST: localhost
      PGUSER: testuser
      PGPASSWORD: testpass
      PGDATABASE: testdb
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

      - name: Write failure summary
        if: failure()
        run: |
          echo "## Integration Tests Failed"  >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "| Item      | Value                    |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Job       | test-integration         |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js   | ${{ env.NODE_VERSION }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u)               |" >> $GITHUB_STEP_SUMMARY

      - name: Write step summary
        if: always()
        run: |
          echo "## Integration Test Results"  >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "| Metric    | Value                    |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status    | ${{ job.status }}        |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js   | ${{ env.NODE_VERSION }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Database  | PostgreSQL 16            |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u)               |" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Docker build + push to GHCR ───────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    needs: [test, test-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup QEMU for multi-platform build
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/product-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write failure summary
        if: failure()
        run: |
          echo "## Docker Build/Push Failed"         >> $GITHUB_STEP_SUMMARY
          echo ""                                    >> $GITHUB_STEP_SUMMARY
          echo "| Item      | Value                          |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry  | ghcr.io                        |" >> $GITHUB_STEP_SUMMARY
          echo "| Image     | ${{ github.repository_owner }}/product-api |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u)                     |" >> $GITHUB_STEP_SUMMARY

      - name: Write build summary
        if: always()
        run: |
          echo "## Docker Build Report"              >> $GITHUB_STEP_SUMMARY
          echo ""                                    >> $GITHUB_STEP_SUMMARY
          echo "| Item      | Value                                        |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------------------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | linux/amd64, linux/arm64                     |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry  | ghcr.io                                      |" >> $GITHUB_STEP_SUMMARY
          echo "| Image     | ${{ github.repository_owner }}/product-api   |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags      | ${{ steps.meta.outputs.tags }}               |" >> $GITHUB_STEP_SUMMARY
          echo "| Status    | ${{ job.status }}                            |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u)                                   |" >> $GITHUB_STEP_SUMMARY
